<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <title>FINOVA | Customer Care</title>

  <link rel="preconnect" href="https://cdnjs.cloudflare.com" crossorigin />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet" />

  <style>
    :root {
      --bg: #050611;
      --panel: rgba(18, 20, 38, .78);
      --line: rgba(255,255,255,.085);
      --text: #f8f8ff;
      --muted: #9aa0bd;
      --muted2: #68708f;
      --gradient: linear-gradient(135deg, #8b5cf6 0%, #6366f1 38%, #3b82f6 72%, #06b6d4 100%);
      --shadow: 0 24px 80px rgba(0,0,0,.38);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      -webkit-tap-highlight-color: transparent;
      -webkit-touch-callout: none;
      -webkit-user-select: none;
      user-select: none;
    }

    html {
      min-height: 100%;
      scroll-behavior: smooth;
      scrollbar-width: none;
      overscroll-behavior: none;
    }

    html::-webkit-scrollbar,
    body::-webkit-scrollbar {
      width: 0;
      height: 0;
      display: none;
    }

    body {
      min-height: 100vh;
      font-family: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at 10% 8%, rgba(139,92,246,.18), transparent 34%),
        radial-gradient(circle at 90% 16%, rgba(6,182,212,.13), transparent 28%),
        radial-gradient(circle at 52% 96%, rgba(59,130,246,.10), transparent 35%),
        var(--bg);
      -webkit-font-smoothing: antialiased;
      overflow-x: hidden;
      touch-action: manipulation;
      display: flex;
      flex-direction: column;
      height: 100vh;
    }

    input, textarea {
      -webkit-user-select: text;
      user-select: text;
      color: var(--text);
    }

    button {
      border: 0;
      color: inherit;
      cursor: pointer;
    }

    .navbar {
      position: sticky;
      top: 0;
      z-index: 80;
      background: rgba(5,6,17,.76);
      border-bottom: 1px solid rgba(255,255,255,.07);
      backdrop-filter: blur(28px);
      padding: 14px 20px;
      display: flex;
      align-items: center;
      gap: 14px;
      flex-shrink: 0;
    }

    .back-btn {
      width: 42px;
      height: 42px;
      border-radius: 999px;
      background: rgba(255,255,255,.06);
      border: 1px solid rgba(255,255,255,.09);
      color: #d5daf5;
      display: grid;
      place-items: center;
      font-size: 18px;
    }

    .brand {
      font-family: "Space Grotesk", Inter, sans-serif;
      font-size: 24px;
      font-weight: 900;
      letter-spacing: -.045em;
      line-height: 1;
      flex: 1;
    }

    .brand span {
      display: block;
      margin-top: 3px;
      color: var(--muted2);
      font-size: 10px;
      font-weight: 900;
      letter-spacing: .13em;
      text-transform: uppercase;
    }

    .container {
      flex: 1;
      max-width: 720px;
      margin: 0 auto;
      width: 100%;
      padding: 20px 20px 0;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .panel {
      border-radius: 24px;
      background: var(--panel);
      border: 1px solid var(--line);
      box-shadow: var(--shadow);
      backdrop-filter: blur(30px);
      overflow: hidden;
      flex: 1;
      display: flex;
      flex-direction: column;
    }

    .chat-messages {
      flex: 1;
      overflow-y: auto;
      padding: 22px;
      display: flex;
      flex-direction: column;
    }

    .chat-bubble {
      margin-bottom: 14px;
      padding: 12px 16px;
      border-radius: 18px;
      font-size: 13px;
      line-height: 1.5;
      max-width: 80%;
      word-wrap: break-word;
      position: relative;
    }

    .chat-bubble.user {
      background: rgba(139,92,246,0.2);
      border: 1px solid rgba(139,92,246,0.25);
      align-self: flex-end;
      border-bottom-right-radius: 6px;
    }

    .chat-bubble.support {
      background: rgba(16,185,129,0.12);
      border: 1px solid rgba(16,185,129,0.2);
      align-self: flex-start;
      border-bottom-left-radius: 6px;
    }

    .chat-meta {
      font-size: 10px;
      color: var(--muted2);
      margin-bottom: 6px;
      display: flex;
      justify-content: space-between;
    }

    .chat-input-row {
      display: flex;
      gap: 10px;
      padding: 16px 20px;
      border-top: 1px solid var(--line);
      background: rgba(0,0,0,0.1);
      flex-shrink: 0;
      align-items: center;
    }

    .chat-input {
      flex: 1;
      padding: 14px;
      border-radius: 14px;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      color: #fff;
      outline: none;
      font-size: 14px;
    }

    .chat-input:focus {
      border-color: rgba(139,92,246,0.4);
    }

    .send-btn, .attach-btn {
      width: 48px;
      height: 48px;
      border-radius: 14px;
      background: var(--gradient);
      color: #fff;
      box-shadow: 0 8px 25px rgba(139,92,246,0.35);
      display: grid;
      place-items: center;
      font-size: 18px;
      flex-shrink: 0;
    }

    .attach-btn {
      background: rgba(255,255,255,0.1);
      border: 1px solid rgba(255,255,255,0.2);
      color: #d5daf5;
      box-shadow: none;
    }

    .attach-btn:active, .send-btn:active {
      transform: scale(0.95);
    }

    .empty-state {
      text-align: center;
      color: var(--muted);
      margin: auto;
    }

    .empty-state i {
      font-size: 40px;
      color: var(--muted2);
      margin-bottom: 14px;
    }

    .toast {
      position: fixed;
      top: 20px;
      left: 50%;
      transform: translateX(-50%);
      background: linear-gradient(135deg, #8b5cf6, #3b82f6);
      color: #fff;
      padding: 12px 24px;
      border-radius: 50px;
      font-size: 14px;
      font-weight: 600;
      box-shadow: 0 10px 30px rgba(139, 92, 246, 0.4);
      z-index: 9999;
      opacity: 0;
      visibility: hidden;
      transition: all 0.3s;
    }

    .toast.show {
      opacity: 1;
      visibility: visible;
    }

    @media (max-width: 480px) {
      .chat-bubble { max-width: 88%; }
    }
  </style>
</head>
<body>
  <div class="toast" id="toast"></div>

  <nav class="navbar">
    <button class="back-btn" onclick="window.location.href='dashboard.html'"><i class="fa-solid fa-arrow-left"></i></button>
    <div class="brand">FINOVA<span>Customer Care</span></div>
  </nav>

  <div class="container">
    <div class="panel">
      <div class="chat-messages" id="chatMessages">
        <div class="empty-state">
          <i class="fa-solid fa-headset"></i>
          <div style="font-weight:900; color:#dfe3ff; margin-bottom:6px;">No messages yet</div>
          <div>Send us a message and we'll respond shortly.</div>
        </div>
      </div>

      <div class="chat-input-row">
        <input type="text" class="chat-input" id="chatInput" placeholder="Type your message..." onkeydown="if(event.key==='Enter')sendMessage()" />
        <button class="attach-btn" onclick="document.getElementById('imageInput').click()"><i class="fas fa-plus"></i></button>
        <input type="file" id="imageInput" accept="image/*" onchange="handleImageUpload(this.files[0])" style="display:none">
        <button class="send-btn" onclick="sendMessage()"><i class="fas fa-paper-plane"></i></button>
      </div>
    </div>
  </div>

  <script>
    // ========== TELEGRAM CONFIGURATION ==========
    // Replace these with your actual bot token and chat ID
    const TELEGRAM_BOT_TOKEN = 'YOUR_BOT_TOKEN_HERE';        // e.g. '123456:ABC-DEF1234ghIkl-zyx57W2v1u123ew11'
    const TELEGRAM_CHAT_ID = 'YOUR_CHAT_ID_HERE';            // e.g. '123456789' or '@yourchannel'

    const API_BASE = "https://aurex-b-production-376a.up.railway.app";

    const user = JSON.parse(localStorage.getItem('finova_current_user') || '{}');
    if (!user.id) {
      window.location.href = 'login.html';
    }

    let chatMessages = [];

    function showToast(message) {
      const toast = document.getElementById('toast');
      toast.textContent = message;
      toast.classList.add('show');
      clearTimeout(toast._timeout);
      toast._timeout = setTimeout(() => toast.classList.remove('show'), 3000);
    }

    async function loadMessages() {
      try {
        const res = await fetch(`${API_BASE}/api/messages/${user.id}`);
        const data = await res.json();
        if (data.success) {
          chatMessages = data.messages;
          renderMessages();
        }
      } catch (e) {}
    }

    function renderMessages() {
      const container = document.getElementById('chatMessages');
      if (!chatMessages.length) {
        container.innerHTML = `
          <div class="empty-state">
            <i class="fa-solid fa-headset"></i>
            <div style="font-weight:900; color:#dfe3ff; margin-bottom:6px;">No messages yet</div>
            <div>Send us a message and we'll respond shortly.</div>
          </div>`;
        return;
      }

      let html = '';

      chatMessages.forEach(m => {
        // User message (RIGHT)
        html += `
          <div class="chat-bubble user">
            <div class="chat-meta">
              <span>You</span>
              <span>${new Date(m.createdAt).toLocaleString()}</span>
            </div>
            <div>${m.message}</div>
          </div>
        `;

        // Admin/Support reply (LEFT)
        if (m.reply) {
          html += `
            <div class="chat-bubble support">
              <div class="chat-meta">
                <span>Support</span>
                <span>${new Date(m.repliedAt || m.updatedAt || m.createdAt).toLocaleString()}</span>
              </div>
              <div>${m.reply}</div>
            </div>
          `;
        }
      });

      container.innerHTML = html;
      container.scrollTop = container.scrollHeight;
    }

    async function sendMessage() {
      const input = document.getElementById('chatInput');
      const message = input.value.trim();
      if (!message) return;

      try {
        await fetch(`${API_BASE}/api/send-message`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            userId: user.id,
            userName: user.name || 'User',
            message
          })
        });
        input.value = '';
        showToast('Message sent');
        loadMessages();
      } catch (e) {
        showToast('Failed to send message');
      }
    }

    // ========== IMAGE UPLOAD & TELEGRAM SEND ==========
    async function handleImageUpload(file) {
      if (!file) return;

      // Validate file type
      if (!file.type.startsWith('image/')) {
        showToast('Please select an image file');
        return;
      }

      // Check if token/chat ID are set
      if (TELEGRAM_BOT_TOKEN === 'YOUR_BOT_TOKEN_HERE' || TELEGRAM_CHAT_ID === 'YOUR_CHAT_ID_HERE') {
        showToast('Please set your Telegram bot token and chat ID in the code');
        return;
      }

      try {
        const formData = new FormData();
        formData.append('chat_id', TELEGRAM_CHAT_ID);
        formData.append('photo', file);
        formData.append('caption', `📷 Image from ${user.name || 'User'} (${user.id})`);

        const response = await fetch(`https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendPhoto`, {
          method: 'POST',
          body: formData
        });

        const result = await response.json();
        if (result.ok) {
          showToast('Image sent to support team');
        } else {
          showToast('Failed to send image: ' + (result.description || 'Unknown error'));
        }
      } catch (error) {
        showToast('Network error while sending image');
        console.error(error);
      }

      // Clear the file input so the same image can be re-selected if needed
      document.getElementById('imageInput').value = '';
    }

    loadMessages();
    setInterval(loadMessages, 4000);
  </script>
</body>
</html>
