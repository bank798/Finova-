<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
  <title>CAPITALORA | Log In</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --gradient-premium: linear-gradient(135deg, #8b5cf6 0%, #6366f1 25%, #3b82f6 50%, #06b6d4 100%);
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html {
      height: 100%;
      overflow: hidden;
    }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: #030308;
      color: #f0f0f5;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      -webkit-user-select: none;
      -moz-user-select: none;
      -ms-user-select: none;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
      background-image: 
        radial-gradient(ellipse at 20% 20%, rgba(139, 92, 246, 0.08) 0%, transparent 50%),
        radial-gradient(ellipse at 80% 80%, rgba(59, 130, 246, 0.06) 0%, transparent 50%),
        radial-gradient(ellipse at 50% 50%, rgba(6, 182, 212, 0.04) 0%, transparent 50%);
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      height: 100%;
      width: 100%;
      display: flex;
      justify-content: center;
      padding: 0 24px;
      padding-top: 12vh;
    }

    input {
      -webkit-user-select: text;
      -moz-user-select: text;
      -ms-user-select: text;
      user-select: text;
    }

    .login-wrapper {
      width: 100%;
      max-width: 440px;
    }

    .login-header {
      text-align: center;
      margin-bottom: 28px;
    }

    .logo {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 34px;
      font-weight: 700;
      letter-spacing: -0.03em;
      background: var(--gradient-premium);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .login-header h2 {
      font-size: 22px;
      font-weight: 700;
      color: #e8e8f5;
      margin-top: 8px;
    }

    .login-header p {
      font-size: 13px;
      color: #8080a8;
      margin-top: 4px;
    }

    .form-group {
      margin-bottom: 16px;
    }

    .form-group label {
      display: block;
      font-size: 11px;
      font-weight: 600;
      color: #b0b0d0;
      margin-bottom: 6px;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }

    .input-wrapper {
      position: relative;
    }

    .input-wrapper i {
      position: absolute;
      left: 14px;
      top: 50%;
      transform: translateY(-50%);
      color: #6b6b8a;
      font-size: 14px;
      pointer-events: none;
    }

    .input-wrapper .toggle-password {
      left: auto;
      right: 14px;
      pointer-events: auto;
      cursor: pointer;
      color: #6b6b8a;
    }

    .input-wrapper input {
      width: 100%;
      padding: 14px 42px 14px 42px;
      background: rgba(255, 255, 255, 0.04);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 14px;
      color: #fff;
      font-family: 'Inter', sans-serif;
      font-size: 14px;
      outline: none;
      transition: border-color 0.2s, background 0.2s;
    }

    .input-wrapper input:focus {
      border-color: rgba(139, 92, 246, 0.5);
      background: rgba(255, 255, 255, 0.06);
    }

    .input-wrapper input::placeholder {
      color: #4a4a6a;
    }

    .options-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 22px;
      font-size: 12px;
    }

    .remember-me {
      display: flex;
      align-items: center;
      gap: 6px;
      color: #a0a0c0;
      cursor: pointer;
    }

    .remember-me input {
      accent-color: #8b5cf6;
      width: 14px;
      height: 14px;
      cursor: pointer;
    }

    .forgot-link {
      color: #a78bfa;
      text-decoration: none;
      font-weight: 600;
    }

    .btn {
      width: 100%;
      padding: 14px;
      border-radius: 50px;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      border: none;
      font-family: 'Inter', sans-serif;
      background: var(--gradient-premium);
      color: #fff;
      box-shadow: 0 8px 25px rgba(139, 92, 246, 0.35);
      transition: transform 0.2s;
    }

    .btn:active {
      transform: scale(0.97);
    }

    .signup-text {
      text-align: center;
      margin-top: 22px;
      font-size: 13px;
      color: #8080a8;
    }

    .signup-text a {
      color: #a78bfa;
      text-decoration: none;
      font-weight: 600;
    }

    .back-home {
      text-align: center;
      margin-top: 16px;
    }

    .back-home a {
      color: #6b6b8a;
      font-size: 12px;
      text-decoration: none;
    }

    .toast {
      position: fixed;
      top: 20px;
      left: 50%;
      transform: translateX(-50%);
      background: linear-gradient(135deg, #8b5cf6, #3b82f6);
      color: #fff;
      padding: 12px 24px;
      border-radius: 50px;
      font-size: 14px;
      font-weight: 600;
      box-shadow: 0 10px 30px rgba(139, 92, 246, 0.4);
      z-index: 9999;
      opacity: 0;
      visibility: hidden;
      transition: opacity 0.3s, visibility 0.3s;
    }

    .toast.show {
      opacity: 1;
      visibility: visible;
    }

    @media (max-width: 480px) {
      body {
        padding: 0 16px;
        padding-top: 8vh;
      }
      .logo {
        font-size: 28px;
      }
      .login-header h2 {
        font-size: 20px;
      }
      .input-wrapper input {
        padding: 13px 38px 13px 38px;
      }
    }
  </style>
</head>
<body>
  <div class="toast" id="toast"></div>

  <div class="login-wrapper">
    <div class="login-header">
      <div class="logo">CAPITALORA</div>
      <h2>Welcome back</h2>
      <p>Log in to your digital banking account</p>
    </div>

    <form onsubmit="handleLogin(event)">
      <div class="form-group">
        <label>Email address</label>
        <div class="input-wrapper">
          <i class="fas fa-envelope"></i>
          <input type="email" id="loginEmail" placeholder="you@example.com" required>
        </div>
      </div>
      <div class="form-group">
        <label>Password</label>
        <div class="input-wrapper">
          <i class="fas fa-lock"></i>
          <input type="password" id="loginPassword" placeholder="••••••••" required>
          <i class="fas fa-eye toggle-password" onclick="togglePassword('loginPassword', this)"></i>
        </div>
      </div>
      <div class="options-row">
        <label class="remember-me"><input type="checkbox"> Remember me</label>
        <a href="forget.html" class="forgot-link">Forgot password?</a>
      </div>
      <button type="submit" class="btn">Log In Securely</button>
    </form>

    <div class="signup-text">Don't have an account? <a href="create.html">Sign up free</a></div>
    <div class="back-home"><a href="index.html"><i class="fas fa-arrow-left"></i> Back to home</a></div>
  </div>

  <script>
    document.addEventListener('contextmenu', e => e.preventDefault());

    function showToast(message, duration = 3000) {
      const toast = document.getElementById('toast');
      toast.textContent = message;
      toast.classList.add('show');
      clearTimeout(toast._timeout);
      toast._timeout = setTimeout(() => {
        toast.classList.remove('show');
      }, duration);
    }

    function togglePassword(inputId, icon) {
      const input = document.getElementById(inputId);
      if (input.type === 'password') {
        input.type = 'text';
        icon.classList.replace('fa-eye', 'fa-eye-slash');
      } else {
        input.type = 'password';
        icon.classList.replace('fa-eye-slash', 'fa-eye');
      }
    }

    async function handleLogin(e) {
      e.preventDefault();
      const email = document.getElementById('loginEmail').value.trim();
      const password = document.getElementById('loginPassword').value;

      if (!email || !password) {
        showToast('Please fill all fields');
        return;
      }

      try {
        const API_BASE ="https://aurex-b-production-376a.up.railway.app";
        const response = await fetch(`${API_BASE}/api/login`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, password })
        });
        
        const data = await response.json();

        if (data.success) {
          localStorage.setItem('finova_current_user', JSON.stringify(data.user));
          showToast('Login successful!', 3000);
          setTimeout(() => {
            window.location.href = 'dashboard.html';
          }, 1000);
        } else {
          showToast(data.message || 'Login failed');
        }
      } catch (error) {
        showToast('Connection error. Please try again.');
      }
    }

    window.scrollTo(0, 0);
    document.body.addEventListener('touchmove', function(e) {
      e.preventDefault();
    }, { passive: false });
  </script>
</body>
</html>
