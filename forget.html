<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
  <title>CAPITALORA | Forgot Password</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --gradient-premium: linear-gradient(135deg, #8b5cf6 0%, #6366f1 25%, #3b82f6 50%, #06b6d4 100%);
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html {
      height: 100%;
      overflow: hidden;
    }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: #030308;
      color: #f0f0f5;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      -webkit-user-select: none;
      -moz-user-select: none;
      -ms-user-select: none;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
      background-image: 
        radial-gradient(ellipse at 20% 20%, rgba(139, 92, 246, 0.08) 0%, transparent 50%),
        radial-gradient(ellipse at 80% 80%, rgba(59, 130, 246, 0.06) 0%, transparent 50%),
        radial-gradient(ellipse at 50% 50%, rgba(6, 182, 212, 0.04) 0%, transparent 50%);
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      height: 100%;
      width: 100%;
      display: flex;
      justify-content: center;
      padding: 0 24px;
      padding-top: 12vh;
    }

    input {
      -webkit-user-select: text;
      -moz-user-select: text;
      -ms-user-select: text;
      user-select: text;
    }

    .forgot-wrapper {
      width: 100%;
      max-width: 440px;
    }

    .forgot-header {
      text-align: center;
      margin-bottom: 28px;
    }

    .logo {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 34px;
      font-weight: 700;
      letter-spacing: -0.03em;
      background: var(--gradient-premium);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .icon-circle {
      width: 56px;
      height: 56px;
      border-radius: 50%;
      background: rgba(139, 92, 246, 0.12);
      border: 1px solid rgba(139, 92, 246, 0.25);
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 16px auto;
      font-size: 22px;
      color: #a78bfa;
    }

    .forgot-header h2 {
      font-size: 22px;
      font-weight: 700;
      color: #e8e8f5;
    }

    .forgot-header p {
      font-size: 13px;
      color: #8080a8;
      margin-top: 6px;
    }

    .form-group {
      margin-bottom: 18px;
    }

    .form-group label {
      display: block;
      font-size: 11px;
      font-weight: 600;
      color: #b0b0d0;
      margin-bottom: 6px;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }

    .input-wrapper {
      position: relative;
    }

    .input-wrapper i {
      position: absolute;
      left: 14px;
      top: 50%;
      transform: translateY(-50%);
      color: #6b6b8a;
      font-size: 14px;
      pointer-events: none;
    }

    .input-wrapper input {
      width: 100%;
      padding: 14px 14px 14px 42px;
      background: rgba(255, 255, 255, 0.04);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 14px;
      color: #fff;
      font-family: 'Inter', sans-serif;
      font-size: 14px;
      outline: none;
      transition: border-color 0.2s, background 0.2s;
    }

    .input-wrapper input:focus {
      border-color: rgba(139, 92, 246, 0.5);
      background: rgba(255, 255, 255, 0.06);
    }

    .btn {
      width: 100%;
      padding: 14px;
      border-radius: 50px;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      border: none;
      font-family: 'Inter', sans-serif;
      background: var(--gradient-premium);
      color: #fff;
      box-shadow: 0 8px 25px rgba(139, 92, 246, 0.35);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      transition: transform 0.2s;
    }

    .btn:active {
      transform: scale(0.97);
    }

    .btn:disabled {
      opacity: 0.7;
    }

    .spinner {
      display: none;
      width: 18px;
      height: 18px;
      border: 2px solid rgba(255,255,255,0.3);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .success-state {
      display: none;
      text-align: center;
    }

    .success-icon {
      width: 64px;
      height: 64px;
      border-radius: 50%;
      background: rgba(16, 185, 129, 0.12);
      border: 2px solid rgba(16, 185, 129, 0.3);
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 20px;
      font-size: 30px;
      color: #10b981;
      animation: popIn 0.4s ease;
    }

    @keyframes popIn {
      from { transform: scale(0); opacity: 0; }
      to { transform: scale(1); opacity: 1; }
    }

    .success-state h3 {
      font-size: 20px;
      margin-bottom: 8px;
    }

    .success-state p {
      font-size: 13px;
      color: #9090b0;
      margin-bottom: 4px;
    }

    .masked-email {
      font-size: 15px;
      font-weight: 600;
      color: #c4b5fd;
      background: rgba(139, 92, 246, 0.1);
      padding: 8px 16px;
      border-radius: 10px;
      display: inline-block;
      margin: 8px 0 20px;
      border: 1px solid rgba(139, 92, 246, 0.2);
    }

    .btn-outline {
      width: 100%;
      padding: 12px;
      border-radius: 50px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      border: 1px solid rgba(255,255,255,0.15);
      background: transparent;
      color: #d0d0e8;
      font-family: 'Inter', sans-serif;
      margin-top: 8px;
    }

    .back-link {
      text-align: center;
      margin-top: 20px;
    }

    .back-link a {
      color: #6b6b8a;
      font-size: 12px;
      text-decoration: none;
    }

    /* Notification toast */
    .toast {
      position: fixed;
      top: 20px;
      left: 50%;
      transform: translateX(-50%);
      background: linear-gradient(135deg, #8b5cf6, #3b82f6);
      color: #fff;
      padding: 12px 24px;
      border-radius: 50px;
      font-size: 14px;
      font-weight: 600;
      box-shadow: 0 10px 30px rgba(139, 92, 246, 0.4);
      z-index: 9999;
      opacity: 0;
      visibility: hidden;
      transition: opacity 0.3s, visibility 0.3s;
    }

    .toast.show {
      opacity: 1;
      visibility: visible;
    }

    @media (max-width: 480px) {
      body {
        padding: 0 16px;
        padding-top: 8vh;
      }
      .logo {
        font-size: 28px;
      }
    }
  </style>
</head>
<body>
  <div class="toast" id="toast"></div>

  <div class="forgot-wrapper">
    <div id="formState">
      <div class="forgot-header">
        <div class="logo">CAPITALORA</div>
        <div class="icon-circle"><i class="fas fa-lock"></i></div>
        <h2>Forgot password?</h2>
        <p>Enter your email and we'll send you a reset link</p>
      </div>
      <form onsubmit="handleForgot(event)">
        <div class="form-group">
          <label>Email address</label>
          <div class="input-wrapper">
            <i class="fas fa-envelope"></i>
            <input type="email" id="emailInput" placeholder="you@example.com" required>
          </div>
        </div>
        <button type="submit" class="btn" id="submitBtn">
          <span id="btnText">Send Reset Link</span>
          <span class="spinner" id="spinner"></span>
        </button>
      </form>
      <div class="back-link"><a href="login.html"><i class="fas fa-arrow-left"></i> Back to login</a></div>
    </div>

    <div class="success-state" id="successState">
      <div class="success-icon"><i class="fas fa-check"></i></div>
      <h3>Check your email</h3>
      <p>We've sent a password reset link to</p>
      <div class="masked-email" id="maskedEmail"></div>
      <p style="font-size:12px;color:#7878a0;">Check spam folder if you don't see it</p>
      <button class="btn-outline" onclick="resetForm()">Try a different email</button>
      <button class="btn-outline" onclick="window.location.href='login.html'"><i class="fas fa-arrow-left"></i> Back to login</button>
    </div>
  </div>

  <script>
    document.addEventListener('contextmenu', e => e.preventDefault());

    function showToast(message, duration = 3000) {
      const toast = document.getElementById('toast');
      toast.textContent = message;
      toast.classList.add('show');
      clearTimeout(toast._timeout);
      toast._timeout = setTimeout(() => {
        toast.classList.remove('show');
      }, duration);
    }

    function maskEmail(email) {
      const [name, domain] = email.split('@');
      if (!domain) return email;
      let masked;
      if (name.length <= 2) masked = name[0] + '*'.repeat(name.length - 1);
      else if (name.length <= 4) masked = name[0] + '*'.repeat(name.length - 2) + name[name.length - 1];
      else masked = name.substring(0, 2) + '*'.repeat(name.length - 3) + name[name.length - 1];
      return masked + '@' + domain;
    }

    function handleForgot(e) {
      e.preventDefault();
      const email = document.getElementById('emailInput').value.trim();
      if (!email.includes('@') || !email.includes('.')) {
        showToast('⚠️ Please enter a valid email address');
        return;
      }
      const btn = document.getElementById('submitBtn');
      const btnText = document.getElementById('btnText');
      const spinner = document.getElementById('spinner');
      
      btn.disabled = true;
      btnText.style.display = 'none';
      spinner.style.display = 'inline-block';

      setTimeout(() => {
        document.getElementById('formState').style.display = 'none';
        document.getElementById('successState').style.display = 'block';
        document.getElementById('maskedEmail').textContent = maskEmail(email);
        btn.disabled = false;
        btnText.style.display = 'inline';
        spinner.style.display = 'none';
        showToast('📧 Reset link sent successfully!');
      }, 3000);
    }

    function resetForm() {
      document.getElementById('formState').style.display = 'block';
      document.getElementById('successState').style.display = 'none';
      document.getElementById('emailInput').value = '';
    }

    window.scrollTo(0, 0);
    document.body.addEventListener('touchmove', function(e) {
      e.preventDefault();
    }, { passive: false });
  </script>
</body>
</html>
